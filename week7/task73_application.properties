# ─────────────────────────────────────────────
# SERVICE 1: Patient Service → MySQL (patient_db)
# Save as: patient-service/src/main/resources/application.properties
# ─────────────────────────────────────────────
server.port=8081
spring.application.name=patient-service

spring.datasource.url=jdbc:mysql://localhost:3306/patient_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ─────────────────────────────────────────────
# SERVICE 2: Doctor Service → PostgreSQL (doctor_db)
# Save as: doctor-service/src/main/resources/application.properties
# ─────────────────────────────────────────────
server.port=8082
spring.application.name=doctor-service

spring.datasource.url=jdbc:postgresql://localhost:5432/doctor_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ─────────────────────────────────────────────
# SERVICE 3: Appointment Service → MongoDB (appointment_db)
# Save as: appointment-service/src/main/resources/application.properties
# ─────────────────────────────────────────────
server.port=8083
spring.application.name=appointment-service

spring.data.mongodb.uri=mongodb://localhost:27017/appointment_db
spring.data.mongodb.database=appointment_db
